<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Phyton</title>
    <style>
        body {
            background-color: rgb(255, 246, 197);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: Arial, sans-serif;
            padding: 50px;
        }

        .title {
            color: rgb(58, 38, 22);
            font-family: "Dancing Script", cursive;
            display: flex;
            font-size: 100px;
        }

        .welcome {
            color: rgb(58, 38, 22);
            font-family: "Playfair Display", serif;
            display: flex;
            font-size: 40px;
        }

        .card {
             background-color: rgb(236, 229, 184);
             max-width: 600px;
             margin: auto;
             padding: 30px;
             border-radius: 20px;
             border: 2px solid black;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

</head>
<body>
    <h1 class="title">Phyton + HTML</h1>
    <div class="card">
        <h2 class="welcome">Bem vindo!</h2>
        <p><strong>Nome:</strong> {{ nome }}</p>
        <p><strong>Curso:</strong> {{ curso }}</p>
        <button onclick="mostrarMensagem()">
            Clique aqui
        </button>
        <br><br>
        <a href="/sobre">
            <button>Ir para sobre</button>
        </a>
    </div>
    <script>
        function mostrarMensagem() {
            alert("Parabéns, seu site está funcionando!")
        }
    </script>
</body>
</html>
